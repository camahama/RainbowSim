name: Build Web App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/rainbow_web

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: src/rainbow_web/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build for web
      run: VITE_BASE_PATH=/RainbowSim/ npm run build

    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: rainbowsim-web
        path: src/rainbow_web/dist/

    - name: Create deployment report
      if: success()
      run: |
        echo "✅ Build successful!"
        echo "Web app ready at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
