name: Build Web App

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r rainbow_web/requirements.txt
    
    - name: Build for web
      run: |
        cd rainbow_web
        pygbag main.py --build web
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: rainbowsim-web
        path: rainbow_web/web/

    - name: Create deployment report
      if: success()
      run: |
        echo "✅ Build successful!"
        echo "Web app ready at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
